name: Release

# Tag a commit like `v0.1.0` and push → this workflow builds installers
# on macOS (arm64) and Windows (x64) and uploads them to a draft GitHub
# Release. We don't auto-publish; you review the artifacts and flip the
# draft to released by hand.
#
# Why arm64-only for macOS: GitHub's `macos-13` x64 runner pool is being
# phased out (queue-starved on 2026-06-13), and cross-compiling to x64
# from `macos-14` arm64 needs explicit prebuild-arch handling that we
# haven't wired. Apple Silicon covers every Mac sold since 2020, so we
# ship arm64 for now; Intel Mac users can self-build via `npm run
# package:mac` until we re-enable an x64 runner.
#
# Code signing isn't wired yet — see specs/plan.md M5 punch list. Until
# certs are in place, the produced installers are unsigned and trigger
# Gatekeeper / SmartScreen warnings on install. Fine for dev testing.

on:
  push:
    tags:
      - 'v*'
  # Manual run for testing the build matrix without cutting a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os-label }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-label: macOS
            runner: macos-14
            arch: arm64
            package: package:mac
          - os-label: Windows
            runner: windows-2022
            arch: x64
            package: package:win

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build + package
        env:
          # electron-builder defaults to auto-publishing on CI when a
          # `github` provider is set in package.json. The release job
          # below owns the upload — tell electron-builder to stay
          # local-only with `--publish=never` (forwarded via env so the
          # package.json scripts don't need to change).
          EP_PUBLISH: 'never'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS notarization stays off until certs are wired.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.package }} -- --publish=never

      # upload-artifact@v4 doesn't expand `{dmg,zip,yml}` brace globs the
      # way bash does; the literal pattern matches zero files. List each
      # extension on its own line instead. `dist/*` covers everything
      # electron-builder writes (DMG/ZIP/EXE + the metadata YML files
      # electron-updater consumes).
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minimal-sessions-${{ matrix.os-label }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.yml
            artifacts/**/*.blockmap
