name: Release

# Tag a commit like `v0.1.0` and push → this workflow builds the macOS
# (arm64) installer and uploads it to a draft GitHub Release. We don't
# auto-publish; you review the artifact and flip the draft to released
# by hand.
#
# Why arm64-only: GitHub's `macos-13` x64 runner pool is being phased
# out (queue-starved on 2026-06-13), and cross-compiling to x64 from
# `macos-14` arm64 needs explicit prebuild-arch handling that we
# haven't wired. Apple Silicon covers every Mac sold since 2020, so we
# ship arm64 for now; Intel Mac users can self-build via `npm run
# package:mac` until we re-enable an x64 runner.
#
# Why no Windows: this is currently a macOS-only project (no signed
# Windows installer pipeline). Linux + Windows users can still build
# from source — see README "Build from source".
#
# macOS signing + notarization runs on the GitHub runner using the
# Developer ID Application cert + private key supplied via repo
# secrets (CSC_LINK is a base64-encoded .p12). electron-builder signs
# and notarizes the inner .app automatically; an explicit step after
# the build notarizes + staples the DMG container too so the download
# experience is fully clean.

on:
  push:
    tags:
      - 'v*'
  # Manual run for testing the build matrix without cutting a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os-label }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-label: macOS
            runner: macos-14
            arch: arm64
            package: package:mac

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build + package
        env:
          # electron-builder defaults to auto-publishing on CI when a
          # `github` provider is set in package.json. The release job
          # below owns the upload — tell electron-builder to stay
          # local-only with `--publish=never` (forwarded via env so the
          # package.json scripts don't need to change).
          EP_PUBLISH: 'never'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing — base64-encoded .p12 + its password.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization — Apple ID, app-specific password, team.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run ${{ matrix.package }} -- --publish=never

      # electron-builder notarizes the inner .app but not the DMG
      # container. Without this step, downloading the DMG triggers an
      # "Apple cannot check it" warning on first open even though the
      # installed .app launches cleanly. Submitting the DMG separately
      # and stapling the ticket clears that warning too.
      - name: Notarize + staple DMG
        if: matrix.os-label == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG_FILE=$(ls dist/*.dmg | head -1)
          echo "Submitting $DMG_FILE to Apple for notarization…"
          xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_FILE"
          spctl -a -t open --context context:primary-signature -vv "$DMG_FILE"

      # upload-artifact@v4 doesn't expand `{dmg,zip,yml}` brace globs the
      # way bash does; the literal pattern matches zero files. List each
      # extension on its own line instead.
      #
      # `dist/latest*.yml` matches only the electron-updater metadata
      # (`latest-mac.yml`) and deliberately excludes
      # `dist/builder-debug.yml`, which has the same name as the
      # equivalent file from any other platform and would collide on
      # the release-attach step if we ever re-add a second platform.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minimal-sessions-${{ matrix.os-label }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
